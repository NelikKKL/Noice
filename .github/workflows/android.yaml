name: Android

on:
  push:
    branches:
      - "**"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

env:
  JAVA_VERSION: 17

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      # Gradle auto-creates ~/.android/debug.keystore on first run.
      # Pre-generate it so the path is available before assembleFreeRelease.
      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build freeRelease APK
        run: ./gradlew :app:assembleFreeRelease --no-daemon

      - name: Locate & rename APK
        id: apk
        run: |
          SRC=$(find app/build/outputs/apk/free/release -name "*.apk" | head -1)
          DEST="noice-${{ github.ref_name }}-free-release.apk"
          cp "$SRC" "$DEST"
          echo "file=$DEST" >> "$GITHUB_OUTPUT"
          echo "size=$(du -sh "$DEST" | cut -f1)" >> "$GITHUB_OUTPUT"

      # Always upload as artifact (14 days) — useful for branch builds / PRs
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: noice-free-release-${{ github.sha }}
          path: ${{ steps.apk.outputs.file }}
          retention-days: 14

      # On tag push → create a real GitHub Release with just the APK
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Noice ${{ github.ref_name }}"
          generate_release_notes: true
          files: ${{ steps.apk.outputs.file }}
